<!DOCTYPE html>
<html>
<head>
    <title>History</title>
</head>
<body>

<h2>URL History</h2>

<table border="1" cellpadding="8">
    <tr>
        <th>Short Code</th>
        <th>Original URL</th>
        <th>Clicks</th>
        <th>Created At</th>
    </tr>

    {% for row in rows %}
    <tr>
        <td>
            <a href="/{{ row[0] }}">{{ row[0] }}</a>
        </td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
